name: Build Android AAB (TWA)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (ex: 1.0.1)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (entier, ex: 2)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Detect and setup Android SDK
        run: |
          # Find Android SDK path
          if [ -n "$ANDROID_HOME" ] && [ -d "$ANDROID_HOME" ]; then
            ANDROID_SDK_PATH="$ANDROID_HOME"
          elif [ -n "$ANDROID_SDK_ROOT" ] && [ -d "$ANDROID_SDK_ROOT" ]; then
            ANDROID_SDK_PATH="$ANDROID_SDK_ROOT"
          elif [ -d "/usr/local/lib/android/sdk" ]; then
            ANDROID_SDK_PATH="/usr/local/lib/android/sdk"
          else
            echo "Android SDK not found, listing candidates:"
            find /usr/local /opt -maxdepth 4 -name "sdkmanager" 2>/dev/null || true
            exit 1
          fi
          echo "ANDROID_SDK_PATH=$ANDROID_SDK_PATH" >> $GITHUB_ENV
          echo "Found Android SDK at: $ANDROID_SDK_PATH"
          ls "$ANDROID_SDK_PATH"

          # Accept licenses and install required components
          SDKMANAGER=""
          if [ -f "$ANDROID_SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_PATH/cmdline-tools/latest/bin/sdkmanager"
          elif [ -f "$ANDROID_SDK_PATH/tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_PATH/tools/bin/sdkmanager"
          fi

          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
            "$SDKMANAGER" "build-tools;34.0.0" "platforms;android-34" "platform-tools" || true
          fi

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (JDK + Android SDK paths)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_SDK_PATH}\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Restore keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          ls -lh android.keystore

      - name: Update version in twa-manifest.json
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.appVersion = '${VERSION_NAME}';
            m.appVersionCode = parseInt('${VERSION_CODE}');
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('Version:', m.appVersion, 'Code:', m.appVersionCode);
          "

      - name: Build AAB with Bubblewrap
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --manifest ./twa-manifest.json \
            --keystorePassword "${KEYSTORE_PASSWORD}" \
            --keyPassword "${KEY_PASSWORD}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebsam-release-${{ github.event.inputs.version_name || '1.0.0' }}.aab
          path: |
            app-release-bundle.aab
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: rebsam-debug-${{ github.event.inputs.version_name || '1.0.0' }}.apk
          path: |
            app-release-signed.apk
            app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7
