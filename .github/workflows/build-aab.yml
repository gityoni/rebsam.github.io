name: Build Android AAB (TWA)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (ex: 1.0.1)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (entier, ex: 2)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_SDK_ROOT}"
          }
          EOF
          echo "=== Bubblewrap config ==="
          cat ~/.bubblewrap/config.json

      - name: Restore keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          ls -lh android.keystore

      - name: Update version in twa-manifest.json
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name || '1.0.0' }}"
          VERSION_CODE="${{ github.event.inputs.version_code || '1' }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            const versionName = process.env.VERSION_NAME || '1.0.0';
            const versionCode = parseInt(process.env.VERSION_CODE || '1', 10);
            m.appVersion = versionName;
            m.appVersionCode = versionCode;
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('Version:', m.appVersion, 'Code:', m.appVersionCode);
          "
        env:
          VERSION_NAME: "${{ github.event.inputs.version_name || '1.0.0' }}"
          VERSION_CODE: "${{ github.event.inputs.version_code || '1' }}"

      - name: Generate Android project with Bubblewrap
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: "${{ github.event.inputs.version_name || '1.0.0' }}"
          VERSION_CODE: "${{ github.event.inputs.version_code || '1' }}"
        run: |
          # Pipe all expected prompts: versionName, versionCode, then empty lines for any other prompts
          printf "%s\n%s\n\n\n\n\n" "$VERSION_NAME" "$VERSION_CODE" | bubblewrap update \
            --skipPwaValidation \
            --manifest ./twa-manifest.json

      - name: Build AAB with Bubblewrap
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --manifest ./twa-manifest.json

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebsam-release-${{ github.event.inputs.version_name || '1.0.0' }}.aab
          path: |
            app-release-bundle.aab
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: rebsam-debug-${{ github.event.inputs.version_name || '1.0.0' }}.apk
          path: |
            app-release-signed.apk
            app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7
