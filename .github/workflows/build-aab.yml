name: Build Android AAB (TWA)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (ex: 1.0.1)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (entier, ex: 2)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK (clean, user-owned)
        run: |
          set -euo pipefail

          SDK="$ANDROID_SDK_ROOT"
          mkdir -p "$SDK/cmdline-tools"

          echo "=== Downloading Android command-line tools ==="
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -O /tmp/cmdlt.zip
          unzip -q /tmp/cmdlt.zip -d /tmp/cmdlt_extract
          mv /tmp/cmdlt_extract/cmdline-tools "$SDK/cmdline-tools/latest"

          SDKMANAGER="$SDK/cmdline-tools/latest/bin/sdkmanager"
          chmod +x "$SDKMANAGER"

          echo "=== Accepting licenses ==="
          (yes 2>/dev/null || true) | "$SDKMANAGER" --licenses

          echo "=== Installing SDK components ==="
          "$SDKMANAGER" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools"

          echo "=== Verifying installation ==="
          echo "build-tools:" && ls "$SDK/build-tools/"
          echo "platforms:"   && ls "$SDK/platforms/"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_SDK_ROOT}"
          }
          EOF
          echo "=== Bubblewrap config ==="
          cat ~/.bubblewrap/config.json

      - name: Restore keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          ls -lh android.keystore

      - name: Update version in twa-manifest.json
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.appVersion = '${VERSION_NAME}';
            m.appVersionCode = parseInt('${VERSION_CODE}');
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('Version:', m.appVersion, 'Code:', m.appVersionCode);
          "

      - name: Build AAB with Bubblewrap
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --manifest ./twa-manifest.json \
            --keystorePassword "${KEYSTORE_PASSWORD}" \
            --keyPassword "${KEY_PASSWORD}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebsam-release-${{ github.event.inputs.version_name || '1.0.0' }}.aab
          path: |
            app-release-bundle.aab
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: rebsam-debug-${{ github.event.inputs.version_name || '1.0.0' }}.apk
          path: |
            app-release-signed.apk
            app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7
