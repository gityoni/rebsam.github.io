name: Build Android AAB (TWA)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (ex: 1.0.1)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (entier, ex: 2)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK components
        run: |
          echo "=== Android SDK debug ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "Using SDK: $SDK"
          ls "$SDK" || (echo "SDK dir not found at $SDK" && exit 1)

          # Locate sdkmanager
          SDKMANAGER=""
          for candidate in \
            "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            "$SDK/cmdline-tools/11.0/bin/sdkmanager" \
            "$SDK/tools/bin/sdkmanager"; do
            if [ -f "$candidate" ]; then
              SDKMANAGER="$candidate"
              echo "Found sdkmanager at: $SDKMANAGER"
              break
            fi
          done

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found — installing cmdline-tools"
            ls "$SDK/cmdline-tools/" 2>/dev/null || echo "(no cmdline-tools dir)"
            # Install fresh cmdline-tools
            wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdlt.zip
            mkdir -p "$SDK/cmdline-tools"
            unzip -q /tmp/cmdlt.zip -d /tmp/cmdlt
            mv /tmp/cmdlt/cmdline-tools "$SDK/cmdline-tools/latest"
            SDKMANAGER="$SDK/cmdline-tools/latest/bin/sdkmanager"
          fi

          echo "=== Accepting licenses ==="
          yes | "$SDKMANAGER" --licenses

          echo "=== Installing build-tools and platform ==="
          "$SDKMANAGER" "build-tools;34.0.0" "platforms;android-34" "platform-tools"

          echo "=== Installed build-tools ==="
          ls "$SDK/build-tools/"
          echo "=== Installed platforms ==="
          ls "$SDK/platforms/"

          echo "ANDROID_SDK_PATH=$SDK" >> $GITHUB_ENV

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (JDK + Android SDK paths)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_SDK_PATH}\"}" > ~/.bubblewrap/config.json
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Restore keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          ls -lh android.keystore

      - name: Update version in twa-manifest.json
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.appVersion = '${VERSION_NAME}';
            m.appVersionCode = parseInt('${VERSION_CODE}');
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('Version:', m.appVersion, 'Code:', m.appVersionCode);
          "

      - name: Build AAB with Bubblewrap
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --manifest ./twa-manifest.json \
            --keystorePassword "${KEYSTORE_PASSWORD}" \
            --keyPassword "${KEY_PASSWORD}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebsam-release-${{ github.event.inputs.version_name || '1.0.0' }}.aab
          path: |
            app-release-bundle.aab
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: rebsam-debug-${{ github.event.inputs.version_name || '1.0.0' }}.apk
          path: |
            app-release-signed.apk
            app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7
